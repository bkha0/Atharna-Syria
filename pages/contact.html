<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آثارنا - تواصل معنا</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="../assets/icons/logo.svg" alt="شعار آثارنا">
        </div>
        <ul class="list">
            <li class="item"><a href="../index.html">الرئيسية</a></li>
            <li class="item"><a href="../index.html#sc3">الخريطة</a></li>
            <li class="item"><a href="../index.html#sc2">استكشف</a></li>
            <li class="item"><a href="contact.html">تواصل</a></li>
            <li class="item"><a href="about.html">من نحن</a></li>
        </ul>
    </div>

    <div class="container-contact">
        <div class="contact-form">
            <input type="text" placeholder="الاسم الكامل" class="fullName">
            <input type="email" placeholder="البريد الإلكتروني: example@gmail.com" class="emailInput">
            <input type="text" placeholder="الموضوع" class="object">
            <textarea rows="5" cols="40" placeholder="رسالتك..." class="message"></textarea>
            <button class="send-btn">إرسال</button>
        </div>
        <div class="keepInTouch">
            <h3>تابعنا</h3>
            <div class="social-icons">
                <a href="#"><i class='bx bxl-facebook'></i></a>
                <a href="#"><i class='bx bxl-twitter'></i></a>
                <a href="#"><i class='bx bxl-instagram'></i></a>
                <a href="#"><i class='bx bxl-github'></i></a>
                <a href="#"><i class='bx bxl-youtube'></i></a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 آثارنا - توثيق التراث السوري. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/map.js"></script>
</body>
</html>
